<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Zappy Map</title>
  <style>
    body{font-family: monospace; padding: 16px;}
    table{border-collapse: collapse;}
    td{
      width: 32px; height: 32px;
      border: 1px solid #ccc;
      text-align: center; vertical-align: middle;
      font-size: 11px;
    }
    td.player{background: #d0eaff;}
    td a{display: block; width: 100%; height: 100%; color: inherit; text-decoration: none;}
  </style>
</head>
<body>
  <h2>Zappy Map</h2>
  <p id="info">En attente...</p>
  <table id="map"></table>
  <script>
    async function poll() {
      const data = await fetch('/state').then(r => r.json());
      if (!data.width)
        return;
      document.getElementById('info').textContent =
        `${data.width}x${data.height} | teams: ${data.teams.join(', ')} | players: ${Object.keys(data.players).length}`;
      const cells = {};
      for (const [id, p] of Object.entries(data.players))
        cells[`${p.x},${p.y}`] = (cells[`${p.x},${p.y}`] || '') + `#${id}`;
      let html = '';
      for (let y = 0; y < data.height; y++) {
        html += '<tr>';
        for (let x = 0; x < data.width; x++) {
          const p = cells[`${x},${y}`];
          html += `<td class="${p ? 'player' : ''}"><a href="/tile/${x}/${y}">${p || ''}</a></td>`;
        }
        html += '</tr>';
      }
      document.getElementById('map').innerHTML = html;
    }
    setInterval(poll, 1000);
    poll();
  </script>
</body>
</html>
